  Chart.register({
    id:'sourcePlugin',
    afterDraw:function(chart){
      var p=chart.options.plugins.sourcePlugin;
      if(!p||!p.text) return;
      var ctx=chart.ctx,h=chart.height,cl=chart.chartArea.left;
      ctx.save();
      ctx.font="11px Arial,sans-serif";
      ctx.fillStyle=p.color||'#9ca3af';
      ctx.textAlign='left';
      ctx.fillText(p.text,cl,h-8);
      ctx.restore();
    }
  });
  new Chart(document.getElementById('c'),cfg);

<script>
  (function(){
    var NATURAL_W = 760;
    var wrap = document.getElementById('scale-wrap');
    function rescale(){
      var vw = window.innerWidth;
      if(vw >= NATURAL_W){ wrap.style.transform=''; wrap.style.transformOrigin=''; document.body.style.height=''; return; }
      var scale = vw / NATURAL_W;
      wrap.style.transformOrigin = 'top left';
      wrap.style.transform = 'scale(' + scale + ')';
      // shrink body height so iframe doesn't show empty space below
      document.body.style.height = Math.round((460 + 40) * scale) + 'px';
    }
    rescale();
    window.addEventListener('resize', rescale);
  })();</script>
</body>
